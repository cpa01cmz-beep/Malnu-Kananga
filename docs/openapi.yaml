openapi: 3.0.3
info:
  title: MA Malnu Kananga API
  description: |
    RESTful API for MA Malnu Kananga School Management System.
    
    This API provides endpoints for managing users, students, teachers, academic records, 
    events, PPDB registration, and more. It uses JWT-based authentication with role-based 
    access control (RBAC).
    
    **Base URL**: `https://your-domain.com/api`
    
    **Authentication**: Bearer Token (JWT)
    
    **WebSocket**: `wss://your-domain.com/ws`
    
    For detailed documentation, see [api-reference.md](./api-reference.md).
  version: 3.3.0
  contact:
    name: MA Malnu Kananga
    email: info@ma-malnukananga.sch.id
  license:
    name: Proprietary

servers:
  - url: https://your-domain.com/api
    description: Production server
  - url: http://localhost:8787/api
    description: Development server

tags:
  - name: Authentication
    description: User authentication and session management
  - name: Users
    description: User management (admin, teachers, students, staff, OSIS)
  - name: Students
    description: Student profile and academic information
  - name: Teachers
    description: Teacher profile and subject assignments
  - name: Academic
    description: Subjects, classes, schedules, grades, attendance
  - name: PPDB
    description: New student registration (Penerimaan Peserta Didik Baru)
  - name: Events
    description: School events and OSIS event management
  - name: Parent
    description: Parent portal for child monitoring
  - name: E-Library
    description: Digital learning resources and materials
  - name: Announcements
    description: School announcements and notifications
  - name: Inventory
    description: School inventory and asset management
  - name: Files
    description: File upload and management (R2 storage)
  - name: AI
    description: AI-powered features and chat
  - name: WebSocket
    description: Real-time WebSocket events

paths:
  /auth/login:
    post:
      tags:
        - Authentication
      summary: User login
      description: Authenticate user and receive JWT tokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: admin@example.com
                password:
                  type: string
                  format: password
                  example: password123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Login successful
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      token:
                        type: string
                        description: Access token (15 minutes expiry)
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
                      refreshToken:
                        type: string
                        description: Refresh token (7 days expiry)
                        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: User logout
      description: Invalidate user session
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Logout successful

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh access token
      description: Get new access token using refresh token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  description: Refresh token
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        description: New access token

  /users:
    get:
      tags:
        - Users
      summary: Get all users
      description: Retrieve list of all users (admin only)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags:
        - Users
      summary: Create user
      description: Create a new user (admin only)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'

  /users/{id}:
    get:
      tags:
        - Users
      summary: Get user by ID
      description: Retrieve user details
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: User details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - Users
      summary: Update user
      description: Update user information
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                role:
                  type: string
                  enum: [admin, teacher, student, staff, osis, wakasek, kepsek, parent]
                status:
                  type: string
                  enum: [active, inactive]
      responses:
        '200':
          description: User updated successfully

    delete:
      tags:
        - Users
      summary: Delete user
      description: Delete user account (admin only)
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: User deleted successfully
        '403':
          $ref: '#/components/responses/Forbidden'

  /students:
    get:
      tags:
        - Students
      summary: Get all students
      description: Retrieve list of all students
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
        - name: class_name
          in: query
          description: Filter by class name
          schema:
            type: string
          example: X-A-1
        - name: user_id
          in: query
          description: Filter by user ID
          schema:
            type: string
      responses:
        '200':
          description: List of students
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Student'

    post:
      tags:
        - Students
      summary: Create student
      description: Register a new student
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentCreate'
      responses:
        '201':
          description: Student created successfully

  /students/{id}:
    get:
      tags:
        - Students
      summary: Get student by ID
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Student details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Student'

    put:
      tags:
        - Students
      summary: Update student
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentUpdate'
      responses:
        '200':
          description: Student updated successfully

    delete:
      tags:
        - Students
      summary: Delete student
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Student deleted successfully

  /teachers:
    get:
      tags:
        - Teachers
      summary: Get all teachers
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        '200':
          description: List of teachers
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Teacher'

    post:
      tags:
        - Teachers
      summary: Create teacher
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherCreate'
      responses:
        '201':
          description: Teacher created successfully

  /teachers/{id}:
    get:
      tags:
        - Teachers
      summary: Get teacher by ID
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Teacher details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/Teacher'

    put:
      tags:
        - Teachers
      summary: Update teacher
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeacherUpdate'
      responses:
        '200':
          description: Teacher updated successfully

    delete:
      tags:
        - Teachers
      summary: Delete teacher
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200':
          description: Teacher deleted successfully

  /subjects:
    get:
      tags:
        - Academic
      summary: Get all subjects
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of subjects
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Subject'

    post:
      tags:
        - Academic
      summary: Create subject
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubjectCreate'
      responses:
        '201':
          description: Subject created successfully

  /classes:
    get:
      tags:
        - Academic
      summary: Get all classes
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of classes
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Class'

    post:
      tags:
        - Academic
      summary: Create class
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassCreate'
      responses:
        '201':
          description: Class created successfully

  /schedules:
    get:
      tags:
        - Academic
      summary: Get all schedules
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of schedules
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Schedule'

    post:
      tags:
        - Academic
      summary: Create schedule
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleCreate'
      responses:
        '201':
          description: Schedule created successfully

  /grades:
    get:
      tags:
        - Academic
      summary: Get grades
      description: Retrieve grades with optional filtering
      security:
        - BearerAuth: []
      parameters:
        - name: student_id
          in: query
          description: Filter by student ID
          schema:
            type: string
        - name: subject_id
          in: query
          description: Filter by subject ID
          schema:
            type: string
        - name: class_id
          in: query
          description: Filter by class ID
          schema:
            type: string
      responses:
        '200':
          description: List of grades
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Grade'

    post:
      tags:
        - Academic
      summary: Create grade
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GradeCreate'
      responses:
        '201':
          description: Grade created successfully

  /attendance:
    get:
      tags:
        - Academic
      summary: Get attendance records
      security:
        - BearerAuth: []
      parameters:
        - name: student_id
          in: query
          description: Filter by student ID
          schema:
            type: string
        - name: class_id
          in: query
          description: Filter by class ID
          schema:
            type: string
        - name: date
          in: query
          description: Filter by date (YYYY-MM-DD)
          schema:
            type: string
            format: date
      responses:
        '200':
          description: List of attendance records
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Attendance'

    post:
      tags:
        - Academic
      summary: Create attendance record
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttendanceCreate'
      responses:
        '201':
          description: Attendance created successfully

  /ppdb_registrants:
    get:
      tags:
        - PPDB
      summary: Get all PPDB registrants
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of registrants
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/PPDBRegistrant'

    post:
      tags:
        - PPDB
      summary: Create PPDB registration
      description: Register new student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PPDBRegistrantCreate'
      responses:
        '201':
          description: Registration created successfully

  /school_events:
    get:
      tags:
        - Events
      summary: Get all school events
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SchoolEvent'

    post:
      tags:
        - Events
      summary: Create school event
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolEventCreate'
      responses:
        '201':
          description: Event created successfully

  /parent/children:
    get:
      tags:
        - Parent
      summary: Get parent's children
      description: Retrieve list of children associated with parent account
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of children
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ParentChild'

  /parent/grades:
    get:
      tags:
        - Parent
      summary: Get child's grades
      security:
        - BearerAuth: []
      parameters:
        - name: student_id
          in: query
          required: true
          description: Student ID
          schema:
            type: string
      responses:
        '200':
          description: List of grades
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Grade'

  /parent/attendance:
    get:
      tags:
        - Parent
      summary: Get child's attendance
      security:
        - BearerAuth: []
      parameters:
        - name: student_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of attendance records
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Attendance'

  /parent/schedule:
    get:
      tags:
        - Parent
      summary: Get child's schedule
      security:
        - BearerAuth: []
      parameters:
        - name: student_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: List of schedules
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Schedule'

  /e_library:
    get:
      tags:
        - E-Library
      summary: Get library materials
      security:
        - BearerAuth: []
      parameters:
        - name: category
          in: query
          description: Filter by category
          schema:
            type: string
            enum: [buku_teks, modul, video_pembelajaran, soal_latihan, referensi, lainnya]
        - name: subject_id
          in: query
          description: Filter by subject ID
          schema:
            type: string
      responses:
        '200':
          description: List of materials
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ELibrary'

    post:
      tags:
        - E-Library
      summary: Upload library material
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                category:
                  type: string
                subject_id:
                  type: string
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Material uploaded successfully

  /announcements:
    get:
      tags:
        - Announcements
      summary: Get announcements
      security:
        - BearerAuth: []
      parameters:
        - name: active
          in: query
          description: Filter by active status
          schema:
            type: boolean
        - name: category
          in: query
          description: Filter by category
          schema:
            type: string
      responses:
        '200':
          description: List of announcements
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Announcement'

    post:
      tags:
        - Announcements
      summary: Create announcement
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnnouncementCreate'
      responses:
        '201':
          description: Announcement created successfully

  /inventory:
    get:
      tags:
        - Inventory
      summary: Get inventory items
      security:
        - BearerAuth: []
      responses:
        '200':
          description: List of inventory items
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/InventoryItem'

    post:
      tags:
        - Inventory
      summary: Create inventory item
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InventoryItemCreate'
      responses:
        '201':
          description: Item created successfully

  /files/upload:
    post:
      tags:
        - Files
      summary: Upload file
      description: Upload file to R2 storage
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                path:
                  type: string
                  description: Optional path for file organization
      responses:
        '200':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      key:
                        type: string
                      url:
                        type: string
                      size:
                        type: integer
                      type:
                        type: string
                      name:
                        type: string

  /files/download:
    get:
      tags:
        - Files
      summary: Download file
      security:
        - BearerAuth: []
      parameters:
        - name: key
          in: query
          required: true
          description: File key
          schema:
            type: string
      responses:
        '200':
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary

  /files/delete:
    delete:
      tags:
        - Files
      summary: Delete file
      security:
        - BearerAuth: []
      parameters:
        - name: key
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: File deleted successfully

  /ai/chat:
    post:
      tags:
        - AI
      summary: AI chat
      description: Get AI response from Gemini API
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - message
              properties:
                message:
                  type: string
                  description: User message
                context:
                  type: string
                  description: Optional context for the conversation
                conversationHistory:
                  type: array
                  description: Conversation history for context
                  items:
                    type: object
      responses:
        '200':
          description: AI response
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      response:
                        type: string
                      timestamp:
                        type: string
                        format: date-time
                      model:
                        type: string
                        example: gemini-1.5-flash

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: Resource ID
      schema:
        type: string
      example: "12345678-1234-1234-1234-123456789012"

    LimitParam:
      name: limit
      in: query
      description: Maximum number of results to return
      schema:
        type: integer
        default: 20
        maximum: 100

    OffsetParam:
      name: offset
      in: query
      description: Number of results to skip (for pagination)
      schema:
        type: integer
        default: 0
        minimum: 0

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
